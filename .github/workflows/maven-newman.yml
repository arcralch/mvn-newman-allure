name: CI - Maven + Newman + Allure

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Construir imagen Docker
      - name: Build Docker image
        run: docker build -t mvn-newman-allure .

      # 3. Ejecutar pruebas dentro del contenedor
      - name: Run tests in Docker
        run: |
          docker run --name test-container mvn-newman-allure mvn clean test

      # 4. Copiar resultados de Allure desde el contenedor
      - name: Copy Allure results
        run: |
          docker cp test-container:/app/target/allure-results ./allure-results || true

      # 5. Generar reporte Allure
      - name: Generate Allure report
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      # 6. Comprimir reporte en ZIP
      - name: Compress Allure report
        run: |
          zip -r allure-report.zip allure-report

      # 7. Subir artefacto (ZIP del reporte)
      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report.zip